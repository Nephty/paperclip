<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      var stored = localStorage.getItem("paperclip-theme");
      if (stored === "light" || stored === "dark") {
        document.documentElement.setAttribute("data-theme", stored);
      }
    })();
  </script>
  <title>{% block title %}Paperclip{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f6f4;
      --panel: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #ddd8d0;
      --accent: #b3541e;
      --accent-text: #ffffff;
      --danger: #a8362a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1b19;
        --panel: #262421;
        --text: #ece7e0;
        --muted: #9a9388;
        --border: #3a3733;
        --accent: #d97b3f;
        --accent-text: #1c1b19;
        --danger: #e0685a;
      }
    }
    :root[data-theme="light"] {
      --bg: #f6f6f4;
      --panel: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #ddd8d0;
      --accent: #b3541e;
      --accent-text: #ffffff;
      --danger: #a8362a;
    }
    :root[data-theme="dark"] {
      --bg: #1c1b19;
      --panel: #262421;
      --text: #ece7e0;
      --muted: #9a9388;
      --border: #3a3733;
      --accent: #d97b3f;
      --accent-text: #1c1b19;
      --danger: #e0685a;
    }
    body { background: var(--bg); color: var(--text); }

    /* Django renders these widgets without classes, so they're styled here
       instead of scattering the same utility string across every form.
       `body` prefix bumps specificity above Tailwind's CDN Preflight reset
       (`button, input, ..., textarea { padding: 0; ... }`), which is
       equal-specificity to a plain element selector and gets injected
       into the page after this block — without it, Preflight silently
       wins on source order and zeroes this padding out entirely. */
    body input[type=text], body input[type=password] {
      width: 100%;
      padding: 0.6rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }
    body textarea {
      width: 100%;
      padding: 1.1rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95rem;
      resize: vertical;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    body textarea::placeholder { color: var(--muted); opacity: 0.75; }
    body textarea:hover { border-color: color-mix(in srgb, var(--border) 55%, var(--accent) 45%); }
    body textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
    }
    body textarea::selection { background: color-mix(in srgb, var(--accent) 35%, transparent); }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <header class="sticky top-0 z-20 flex items-center justify-between gap-4 px-4 sm:px-6 py-2.5 sm:py-3 border-b border-[var(--border)] shadow-[0_1px_3px_rgba(0,0,0,0.06)] backdrop-blur bg-[color-mix(in_srgb,var(--panel)_92%,transparent)]">
    <div class="flex items-center gap-2">
      <a href="/" class="inline-flex items-center px-3 py-1.5 rounded-full border border-[var(--border)] text-sm font-medium hover:bg-[var(--bg)] hover:text-[var(--accent)] transition-colors" title="Back to Nephty Lab">Hub</a>
      <a href="{% url 'pastes:create' %}" class="inline-flex items-center gap-2 text-base sm:text-[1.1rem] font-bold tracking-tight">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-[var(--accent)] text-base leading-none">📎</span>
        Paperclip
      </a>
    </div>
    <nav class="flex items-center gap-1.5 text-[0.85rem] sm:text-[0.92rem] flex-wrap">
      <a href="{% url 'pastes:create' %}" class="inline-flex items-center px-3 py-2 rounded-full hover:bg-[var(--bg)] hover:text-[var(--accent)] transition-colors">New paste</a>
      {% if user.is_authenticated %}
        <a href="{% url 'pastes:mine' %}" class="inline-flex items-center px-3 py-2 rounded-full hover:bg-[var(--bg)] hover:text-[var(--accent)] transition-colors">My pastes</a>
        <span class="w-px h-[1.4rem] bg-[var(--border)] mx-1"></span>
        <span class="inline-flex items-center gap-1.5 rounded-full bg-[var(--bg)] text-[var(--muted)] text-[0.85rem] pl-2 pr-3 py-[0.35rem]">
          <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-[var(--accent)] text-[var(--accent-text)] text-[0.7rem] font-bold uppercase">{{ user.username|slice:":1" }}</span>
          <span class="hidden sm:inline">{{ user.username }}</span>
        </span>
        <form method="post" action="{% url 'accounts:logout' %}" class="inline">
          {% csrf_token %}
          <button type="submit" class="inline-flex items-center px-3 py-2 rounded-full bg-transparent border-0 cursor-pointer hover:bg-[var(--bg)] hover:text-[var(--accent)] transition-colors">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="inline-flex items-center px-3 py-2 rounded-full hover:bg-[var(--bg)] hover:text-[var(--accent)] transition-colors">Log in</a>
      {% endif %}
      <span class="w-px h-[1.4rem] bg-[var(--border)] mx-1"></span>
      <button type="button" id="theme-switch" class="inline-flex items-center justify-center w-[2.1rem] h-[2.1rem] rounded-full text-[1.05rem] leading-none bg-transparent border-0 cursor-pointer hover:bg-[var(--bg)] transition-colors focus-visible:outline focus-visible:outline-2 focus-visible:outline-[var(--accent)] focus-visible:outline-offset-2" title="Toggle light / dark theme" aria-label="Toggle light / dark theme"></button>
    </nav>
  </header>
  <main class="flex-1 w-full lg:w-3/4 lg:mx-auto pt-8 px-4 sm:px-6 pb-16 flex flex-col">
    {% block content %}{% endblock %}
  </main>

  <div class="fixed inset-0 bg-black/45 hidden items-center justify-center z-[100] p-4" id="confirm-modal">
    <div class="bg-[var(--panel)] border border-[var(--border)] rounded-lg p-6 max-w-sm w-full">
      <p class="m-0" id="confirm-modal-message">Are you sure?</p>
      <div class="mt-5 flex gap-3 justify-end">
        <button type="button" class="inline-flex items-center justify-center bg-transparent text-[var(--text)] border border-[var(--border)] px-[1.1rem] py-[0.6rem] rounded-lg text-[0.95rem] font-semibold cursor-pointer" id="confirm-modal-cancel">Cancel</button>
        <button type="button" class="inline-flex items-center justify-center bg-[var(--danger)] text-[var(--accent-text)] border-0 px-[1.1rem] py-[0.6rem] rounded-lg text-[0.95rem] font-semibold cursor-pointer" id="confirm-modal-confirm">Delete</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var root = document.documentElement;
      var switchEl = document.getElementById("theme-switch");

      function currentTheme() {
        var explicit = root.getAttribute("data-theme");
        if (explicit) return explicit;
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      function render() {
        switchEl.textContent = currentTheme() === "dark" ? "🌙" : "☀️";
      }

      render();

      switchEl.addEventListener("click", function () {
        var theme = currentTheme() === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", theme);
        localStorage.setItem("paperclip-theme", theme);
        render();
      });
    })();

    (function () {
      var pendingForm = null;
      var modal = document.getElementById("confirm-modal");
      var message = document.getElementById("confirm-modal-message");

      function openModal() {
        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function closeModal() {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        pendingForm = null;
      }

      document.addEventListener("submit", function (event) {
        var form = event.target;
        if (form.hasAttribute("data-confirm")) {
          event.preventDefault();
          pendingForm = form;
          message.textContent = form.getAttribute("data-confirm");
          openModal();
        }
      });

      document.getElementById("confirm-modal-cancel").addEventListener("click", closeModal);

      document.getElementById("confirm-modal-confirm").addEventListener("click", function () {
        var form = pendingForm;
        closeModal();
        if (form) form.submit();
      });

      modal.addEventListener("click", function (event) {
        if (event.target === modal) closeModal();
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && !modal.classList.contains("hidden")) closeModal();
      });
    })();
  </script>
</body>
</html>
