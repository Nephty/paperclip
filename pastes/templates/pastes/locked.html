{% extends "base.html" %}
{% block title %}Password required — Paperclip{% endblock %}
{% block content %}
<div class="bg-[var(--panel)] border border-[var(--border)] rounded-lg p-6">
  <h1 class="text-2xl font-bold mb-4">🔒 This paste is password protected</h1>
  <form method="post">
    {% csrf_token %}
    <label for="{{ form.password.id_for_label }}" class="block font-semibold mt-4 mb-1.5">Password</label>
    {{ form.password }}
    {% if error %}<ul class="text-[var(--danger)] list-none p-0 my-1 text-sm"><li>{{ error }}</li></ul>{% endif %}
    <div class="mt-6 flex gap-3">
      <button type="submit" class="inline-flex items-center justify-center bg-[var(--accent)] text-[var(--accent-text)] border-0 px-[1.1rem] py-[0.6rem] rounded-lg text-[0.95rem] font-semibold cursor-pointer">Unlock</button>
    </div>
  </form>
</div>
{% endblock %}
